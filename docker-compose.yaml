version: "3.8"

# NETWORKS
networks:
  dev-network:
    driver: bridge

# VOLUMES
volumes:
  vscode-data:
  gitea-data:
  postgres-data:
  mattermost-data:

# SERVICES
services:

  # 1. NGINX — entry point
  nginx:
    image: nginx:alpine
    container_name: dev-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - vscode
      - gitea
      - mattermost
    networks:
      - dev-network
    restart: unless-stopped

  # 2. VS CODE SERVER — browser IDE
  vscode:
    image: codercom/code-server:latest
    container_name: dev-vscode
    environment:
      - PASSWORD=${VSCODE_PASSWORD}
    volumes:
      - vscode-data:/home/coder/project
    expose:
      - "8080"
    networks:
      - dev-network
    restart: unless-stopped
    user: "1000"

  # 3. GITEA — git hosting
  gitea:
    image: gitea/gitea:latest
    container_name: dev-gitea
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=postgres:5432
      - GITEA__database__NAME=${POSTGRES_DB}
      - GITEA__database__USER=${POSTGRES_USER}
      - GITEA__database__PASSWD=${POSTGRES_PASSWORD}
    volumes:
      - gitea-data:/data
    expose:
      - "3000"
    ports:
      - "222:22"
    depends_on:
      - postgres
    networks:
      - dev-network
    restart: unless-stopped

  # 4. POSTGRESQL — database
  postgres:
    image: postgres:15-alpine
    container_name: dev-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - dev-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 5. MATTERMOST — team chat
  mattermost:
    image: mattermost/mattermost-team-edition:latest
    container_name: dev-mattermost
    environment:
      - MM_SQLSETTINGS_DRIVERNAME=postgres
      - MM_SQLSETTINGS_DATASOURCE=${MM_SQLSETTINGS_DATASOURCE}
      - MM_SERVICESETTINGS_SITEURL=http://localhost/chat
    volumes:
      - mattermost-data:/mattermost/data
    expose:
      - "8065"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dev-network
    restart: unless-stopped